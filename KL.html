<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kowloon Bound</title>
</head>
<body>
<pre id="output">Loading...</pre>

<script>
async function load() {
    try {
        const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/376C4835851621D4');
        const json = await res.json();
        let text = '';

        if (!json.data || json.data.length === 0) {
            text = 'No upcoming buses';
        } else {
            json.data.forEach(bus => {
                let etaText = 'No ETA';
                
                if (bus.eta) {
                    const etaTime = new Date(bus.eta);
                    const diffMin = Math.round((etaTime - Date.now()) / 60000);
                    
                    if (diffMin <= 1) {
                        etaText = 'Due';
                    } else {
                        etaText = diffMin + ' min';
                    }
                }
                
                text += `${bus.route} → ${bus.dest_en} - ${etaText}\n`;
            });
        }
        document.getElementById('output').textContent = text.trim();
    } catch (e) {
        document.getElementById('output').textContent = 'Error loading data';
    }
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
